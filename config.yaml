# 抖音视频发布自动化智能体配置

# Seedance 配置
seedance:
  api_key: "your_seedance_api_key"
  base_url: "https://api.seedance.com/v1"
  poll_interval: 5
  max_wait_time: 300

# 抖音配置
douyin:
  app_id: "your_douyin_app_id"
  app_secret: "your_douyin_app_secret"
  api_base_url: "https://open.douyin.com"
  redirect_uri: "http://localhost:8080/callback"
  access_token: ""

# 视频配置
video:
  output_dir: "./videos"
  default_duration: 30
  default_aspect: "9:16"

# 日志配置
log:
  level: "INFO"
