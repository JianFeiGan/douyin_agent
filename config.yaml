# 抖音开放平台配置
douyin:
  app_id: "your_app_id"
  app_secret: "your_app_secret"
  # 抖音开放平台 API 地址
  api_base_url: "https://open.douyin.com"
  # 授权回调地址
  redirect_uri: "http://localhost:8080/callback"

# 视频生成配置
video:
  # 输出目录
  output_dir: "./output"
  # 默认视频宽度
  width: 720
  # 默认视频高度
  height: 1280
  # 默认帧率
  fps: 30
  # 默认视频时长(秒)
  duration: 60

# 日志配置
log:
  level: "INFO"
  format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan>:<cyan>{function}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"
  rotation: "100 MB"
  retention: "7 days"

# 服务配置
server:
  host: "0.0.0.0"
  port: 8080
  reload: true
